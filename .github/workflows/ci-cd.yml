name: CI Pipeline

on:
  push:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./springboot/app/

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./angular-app

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Start application with Docker Compose
        run: docker compose up -d

      - name: Wait for containers to be ready
          run: |
            echo "Waiting for MySQL..."
            sleep 20

      - name: Check running containers
          run: docker ps

      - name: Test MySQL connection from backend container
          run: |
            docker exec github-action--spring-boot-app-1 \
            sh -c "nc -zv mysql 3306"

      - name: Wait for Spring Boot to start
          run: |
            echo "Waiting for Spring Boot..."
            sleep 20
            curl -f http://localhost:8081 || exit 1

      - name: Test frontend to backend communication
          run: |
            docker exec github-action--angular-app-1 \
            sh -c "wget -qO- http://spring-boot-app:8081 || exit 1"
      - name: Check running containers
          run: docker ps

